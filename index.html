<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Runner — Steampunk Roguelike</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Game wrapper -->
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading">
      <div id="loading-title">AETHER RUNNER</div>
      <div>Initialising steam engines…</div>
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
    </div>
  </div>

  <!--
    Scripts loaded in dependency order:
    utils → particles → player → projectile → enemy → weapon → upgrade → wave → ui → main
  -->
  <script src="js/utils.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/player.js"></script>
  <script src="js/projectile.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/weapon.js"></script>
  <script src="js/upgrade.js"></script>
  <script src="js/wave.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
